name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version name (current: unknown)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare version, update Gradle, commit and tag
        id: versioning
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          set -e

          VERSION="$VERSION_INPUT"
          TAG_NAME="v$VERSION"

          echo "Using version: $VERSION"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          CURRENT_CODE=$(grep "versionCode" app/build.gradle | sed "s/[^0-9]*//g")
          echo "Current versionCode: $CURRENT_CODE"
          NEW_CODE=$((CURRENT_CODE + 1))
          echo "New versionCode: $NEW_CODE"

          sed -i "s/versionCode = ${CURRENT_CODE}/versionCode = ${NEW_CODE}/" app/build.gradle
          sed -i "s/versionName = '.*'/versionName = '${VERSION}'/" app/build.gradle

          sed -i "s/New version name (current: .*')/New version name (current: ${VERSION}')/" .github/workflows/release.yml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git status
          git commit -am "Bump version to $TAG_NAME" || echo "No changes to commit"

          if git tag --list "$TAG_NAME" >/dev/null 2>&1 && [ -n "$(git tag --list "$TAG_NAME")" ]; then
            echo "Tag $TAG_NAME already exists. Exiting to avoid overwriting an existing release."
            exit 1
          fi

          git tag "$TAG_NAME"
          git push origin HEAD
          git push origin "$TAG_NAME"

      - name: Generate Changelog (since previous release tag)
        id: changelog
        run: |
          set -e

          TAG_NAME="${TAG_NAME:-${{ env.TAG_NAME }}}"
          echo "Current tag: $TAG_NAME"

          PREVIOUS_TAG=$(git tag --sort=-creatordate 'v*' | sed -n '2p' || echo "")
          echo "Previous tag: $PREVIOUS_TAG"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found. Using full history."
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "Getting commits between $PREVIOUS_TAG and $TAG_NAME"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG..$TAG_NAME" --no-merges)
          fi

          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          else
            echo "No keystore secret found, creating debug keystore"
            keytool -genkey -v -keystore release.keystore -alias release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass password -keypass password \
              -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
          fi

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PRELEASE_STORE_FILE=../release.keystore \
            -PRELEASE_STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD || 'password' }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS || 'release' }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD || 'password' }}"

      - name: Collect Release APK
        id: assets
        run: |
          set -e
          mkdir -p release
          shopt -s nullglob
          APK_FILES=(app/build/outputs/apk/release/*.apk)
          if [ ${#APK_FILES[@]} -eq 0 ]; then
            echo "Error: No APK file found"
            exit 1
          fi

          VERSION="${VERSION:-${{ env.VERSION }}}"
          TARGET="release/DropSauce-release-v${VERSION}.apk"

          echo "Using APK: ${APK_FILES[0]}"
          echo "Target file: $TARGET"

          cp "${APK_FILES[0]}" "$TARGET"

          DOWNLOAD_NOTES="- \`$(basename "$TARGET")\`"

          echo "download_notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DOWNLOAD_NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: |
            release/*.apk
          body: |
            ## DropSauce ${{ env.TAG_NAME }}

            ### Download
            ${{ steps.assets.outputs.download_notes }}

            ### Changelog
            ${{ steps.changelog.outputs.changelog }}

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
