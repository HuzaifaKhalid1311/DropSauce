name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'New version name (for app/build.gradle and release tag)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        else
          echo "No keystore secret found, creating debug keystore"
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
        fi

    - name: Build Release APK
      run: |
        ./gradlew assembleRelease --no-daemon --stacktrace \
          -PRELEASE_STORE_FILE=../release.keystore \
          -PRELEASE_STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD || 'password' }}" \
          -PRELEASE_KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS || 'release' }}" \
          -PRELEASE_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD || 'password' }}"

    - name: Update versionName and increment versionCode
      run: |
        VERSION_NAME="${{ inputs.version_name }}"
        BUILD_GRADLE="app/build.gradle"

        sed -i -E "s/(versionName = ')[^']*(')/\1${VERSION_NAME}\2/" "$BUILD_GRADLE"
        CURRENT_CODE=$(grep -E "versionCode = [0-9]+" "$BUILD_GRADLE" | head -n1 | sed -E "s/.*= ([0-9]+)/\1/")
        NEXT_CODE=$((CURRENT_CODE + 1))
        sed -i -E "s/versionCode = [0-9]+/versionCode = ${NEXT_CODE}/" "$BUILD_GRADLE"

    - name: Commit version updates
      run: |
        if git diff --quiet -- app/build.gradle; then
          echo "No version changes to commit"
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add app/build.gradle
        git commit -m "chore(release): set versionName ${{ inputs.version_name }} and bump versionCode"
        git push

    - name: Find previous successful release workflow run
      id: previous_success
      uses: actions/github-script@v7
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const currentRunId = context.runId;
          const workflowId = "release.yml";

          const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
            owner,
            repo,
            workflow_id: workflowId,
            status: "completed",
            per_page: 100,
          });

          const previous = runs.find((run) => run.conclusion === "success" && run.id !== currentRunId);
          core.setOutput("sha", previous ? previous.head_sha : "");

    - name: Generate Changelog
      id: changelog
      run: |
        PREVIOUS_SUCCESS_SHA="${{ steps.previous_success.outputs.sha }}"
        CURRENT_SHA="${{ github.sha }}"

        if [ -z "$PREVIOUS_SUCCESS_SHA" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$CURRENT_SHA" --no-merges -n 50)
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_SUCCESS_SHA..$CURRENT_SHA" --no-merges)
        fi

        if [ -z "$CHANGELOG" ]; then
          CHANGELOG="- No changes since last successful release workflow run"
        fi

        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Collect Release APKs
      id: assets
      run: |
        mkdir -p release
        shopt -s nullglob
        APK_FILES=(app/build/outputs/apk/release/*.apk)
        if [ ${#APK_FILES[@]} -eq 0 ]; then
          echo "Error: No APK file found"
          exit 1
        fi

        DOWNLOAD_NOTES=""
        for apk in "${APK_FILES[@]}"; do
          target="release/DropSauce-v${{ inputs.version_name }}.apk"
          cp "$apk" "$target"
          DOWNLOAD_NOTES="- \`$(basename "$target")\`"
        done

        echo "download_notes<<EOF" >> "$GITHUB_OUTPUT"
        echo "$DOWNLOAD_NOTES" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ inputs.version_name }}
        name: v${{ inputs.version_name }}
        target_commitish: ${{ github.sha }}
        files: |
          release/*.apk
        body: |
          ## DropSauce v${{ inputs.version_name }}

          ### Download
          ${{ steps.assets.outputs.download_notes }}

          ### Installation Instructions
          1. Download the APK file
          2. Install it on your Android device
          3. If this is your first time installing, you may need to allow installation of apps from unknown sources

          ### Changelog
          ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
